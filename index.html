<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>密码机 - Mastermind</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">


        <div class="game-layout">
            <div id="game-board" class="game-board">
                <!-- 左侧格子区域 - 整体一个背景 -->
                <div class="board-left">
                    <div class="guess-rows">
                        <div class="board-row guess-row current-row" data-row="0">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot editable" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot editable" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot editable" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot editable" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="1">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="2">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="3">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="4">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="5">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>

                        <div class="board-row guess-row" data-row="6">
                            <div class="slots-container">
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="0"></div>
                                    <div class="status-light" data-index="0"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="1"></div>
                                    <div class="status-light" data-index="1"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="2"></div>
                                    <div class="status-light" data-index="2"></div>
                                </div>
                                <div class="slot-wrapper">
                                    <div class="code-slot guess-slot" data-index="3"></div>
                                    <div class="status-light" data-index="3"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧反馈区域 - 整体一个背景 -->
                <div class="board-right">
                    <div class="feedback-rows">
                        <div class="feedback-row current-row" data-row="0">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="1">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="2">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="3">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="4">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="5">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>

                        <div class="feedback-row" data-row="6">
                            <div class="row-feedback">
                                <div class="feedback-point" data-index="0"></div>
                                <div class="feedback-point" data-index="1"></div>
                                <div class="feedback-point" data-index="2"></div>
                                <div class="feedback-point" data-index="3"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="side-feedback" class="side-feedback" style="display: none;">
                    <div class="section-label">反馈</div>
                    <div id="side-feedback-display" class="side-feedback-display"></div>
                </div>
            </div>
        </div>

        <div class="color-selector">
            <button class="color-btn" data-color="red" style="background-color: #e74c3c;"><span class="color-num">1</span></button>
            <button class="color-btn" data-color="green" style="background-color: #2ecc71;"><span class="color-num">2</span></button>
            <button class="color-btn" data-color="orange" style="background-color: #e67e22;"><span class="color-num">3</span></button>
            <button class="color-btn" data-color="blue" style="background-color: #3498db;"><span class="color-num">4</span></button>
            <button class="color-btn" data-color="yellow" style="background-color: #f1c40f;"><span class="color-num">5</span></button>
            <button class="color-btn" data-color="purple" style="background-color: #9b59b6;"><span class="color-num">6</span></button>
            <button class="color-btn" data-color="cyan" style="background-color: #00bcd4;"><span class="color-num">7</span></button>
        </div>

        <div class="sidebar">
            <div class="mode-switch" data-mode="grid">
                <svg class="mode-icon mode-icon-left" viewBox="0 0 24 24" fill="none" style="color: #fff;">
                    <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <line x1="4" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <div class="mode-track">
                    <button class="mode-hotspot mode-hotspot-left"></button>
                    <div class="mode-thumb"></div>
                    <button class="mode-hotspot mode-hotspot-right"></button>
                </div>
                <svg class="mode-icon mode-icon-right" viewBox="0 0 24 24" fill="none" style="color: #fff;">
                    <circle cx="8" cy="8" r="2" fill="currentColor"/>
                    <circle cx="16" cy="8" r="2" fill="currentColor"/>
                    <circle cx="8" cy="16" r="2" fill="currentColor"/>
                    <circle cx="16" cy="16" r="2" fill="currentColor"/>
                </svg>
            </div>

            <!-- 液晶屏显示 - 可点击切换难度 -->
            <div id="lcd-screen" class="lcd-screen clickable" title="点击切换难度">
                <div class="lcd-display">
                    <div class="lcd-label">LEVEL</div>
                    <div id="lcd-level" class="lcd-number">L04</div>
                </div>
            </div>

            <div class="submit-btn-slot">
                <button id="submit-btn" class="submit-btn" title="提交"></button>
            </div>
        </div>
    </div>

    <!-- 历史记录面板 (PC端显示) -->
    <div id="history-panel" class="history-panel">
        <div class="history-section">
                <div class="section-title">📊 累计统计</div>
                <div class="best-records"></div>
            </div>
        <div class="history-section">
            <div class="section-title">📜 最近战绩</div>
            <div class="recent-records"></div>
        </div>
    </div>

    <!-- 记录详情弹窗 -->
    <div id="record-detail" class="record-detail"></div>

    <div id="modal" class="modal">
            <div class="modal-content">
                <h2 id="modal-title"></h2>
                <p id="modal-message"></p>
                <div id="modal-secret" class="modal-secret"></div>
                <button id="modal-btn" class="btn btn-primary">再玩一次</button>
            </div>
        </div>

    <script src="sound.js"></script>
    <script src="game.js"></script>
</body>
</html>
